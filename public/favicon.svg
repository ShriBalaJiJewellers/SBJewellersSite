<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;850&amp;display=swap');
      .brand-text {
        font-family: 'Cinzel', 'Georgia', serif;
        font-weight: 850;
        font-size: 140px;
        fill: #bfa36c;
        text-anchor: middle;
        letter-spacing: 4px;
      }
    </style>
  </defs>
  <!-- Outer Gold Circle -->
  <circle cx="256" cy="256" r="225" fill="#faf8f5" stroke="#bfa36c" stroke-width="14"/>
  
  <!-- Left Accent Dots -->
  <rect x="6" y="220" width="12" height="72" rx="6" fill="#bfa36c" />
  <rect x="24" y="190" width="12" height="132" rx="6" fill="#bfa36c" />
  
  <!-- Right Accent Dots -->
  <rect x="476" y="190" width="12" height="132" rx="6" fill="#bfa36c" />
  <rect x="494" y="220" width="12" height="72" rx="6" fill="#bfa36c" />

  <!-- Monogram text SBJ -->
  <text x="259" y="302" class="brand-text">SBJ</text>
</svg>
